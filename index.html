<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Keamanan</title>
    <script src="ads-manager.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .captcha-container {
            background-color: #ffffff;
            border: 1px solid #d3d3d3;
            border-radius: 3px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 300px;
            height: 74px;
        }

        .captcha-left {
            display: flex;
            align-items: center;
        }

        /* Desain Checkbox Palsu */
        .checkbox-wrapper {
            position: relative;
            width: 28px;
            height: 28px;
            margin-right: 12px;
        }

        .checkbox-custom {
            width: 100%;
            height: 100%;
            border: 2px solid #c1c1c1;
            border-radius: 2px;
            cursor: pointer;
            background: #fff;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animasi Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #4d90fe;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        /* Tanda Centang Hijau */
        .checkmark {
            width: 12px;
            height: 20px;
            border: solid #00aa47;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
            margin-bottom: 4px;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .captcha-text {
            font-size: 14px;
            color: #2b2b2b;
            font-weight: 400;
            user-select: none;
        }

        .captcha-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .captcha-logo {
            width: 32px;
            height: 32px;
            background-image: url('https://www.gstatic.com/recaptcha/api2/logo_48.png');
            background-size: contain;
            background-repeat: no-repeat;
        }

        .captcha-brand-text {
            font-size: 8px;
            color: #555;
            margin-top: 2px;
        }

        .captcha-links {
            font-size: 8px;
            color: #555;
        }
        
        .captcha-links a {
            color: #555;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Verifikasi Akses</h1>
        <p>Silakan klik tombol di bawah ini untuk mengonfirmasi bahwa Anda ingin melanjutkan ke halaman berikutnya.</p>
    <div class="captcha-container">
        <div class="captcha-left">
            <div class="checkbox-wrapper">
                <div class="checkbox-custom" id="captchaBox" onclick="startVerification()">
                    <div class="spinner" id="captchaSpinner"></div>
                    <div class="checkmark" id="captchaCheck"></div>
                </div>
            </div>
            <div class="captcha-text">Saya bukan robot</div>
        </div>
        <div class="captcha-right">
            <div class="captcha-logo"></div>
            <div class="captcha-brand-text">reCAPTCHA</div>
            <div class="captcha-links">
                <a href="#">Privasi</a> - <a href="#">Persyaratan</a>
            </div>
        </div>
    </div>
</div>
    <script>
        // SILAHKAN UBAH ALAMAT DI BAWAH INI KE HALAMAN BERIKUTNYA
        const NEXT_PAGE_URL = "halaman_selanjutnya.html"; 

        function startVerification() {
            const box = document.getElementById('captchaBox');
            const spinner = document.getElementById('captchaSpinner');
            const checkmark = document.getElementById('captchaCheck');

            // Nonaktifkan klik tambahan selama proses berjalan
            box.style.pointerEvents = "none";
            box.style.border = "none";

            // Munculkan loading spinner
            spinner.style.display = "block";

            // Simulasi loading selama 1.5 detik
            setTimeout(() => {
                spinner.style.display = "none";
                checkmark.style.display = "block";

                // Tunggu 0.8 detik setelah centang hijau muncul, lalu pindah halaman
                setTimeout(() => {
                    window.location.href = NEXT_PAGE_URL;
                }, 800);

            }, 1500);
        }
    </script>

</body>
</html>
