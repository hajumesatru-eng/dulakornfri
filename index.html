<script>
let captchaGenerated = "";

// Generate kode captcha otomatis saat halaman dibuka
function generateCaptcha() {
    const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let result = "";
    for (let i = 0; i < 4; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    captchaGenerated = result;
    document.getElementById("captchaDisplay").innerText = result;
}

function validateCaptcha() {
    const userInput = document.getElementById("captchaInputField").value.trim().toUpperCase();
    
    if (userInput === captchaGenerated) {
        // Jika benar, buka link popunder iklan Anda di tab baru
        window.open("https://buffcasualwhine.com/henpkny1f?key=381eaab06b0c4afd4f526aab207f6ca2","_blank");
        
        // Opsional: Anda bisa mengarahkan halaman utama ini ke link film asli setelah sukses
        // alert("Verification Success!"); 
        // window.location.href = "LINK_HALAMAN_UTAMA_FILM_ANDA"; 
    } else {
        alert("Incorrect Captcha code! Please try again.");
        generateCaptcha();
        document.getElementById("captchaInputField").value = "";
    }
}

// Jalankan generator pertama kali
generateCaptcha();
</script>
