<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Security Verification</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}

body{
    background:#0f1117;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:420px;
    max-width:90%;
    background:#1b1f27;
    border:1px solid #2b313d;
    border-radius:16px;
    padding:40px;
    box-shadow:0 0 40px rgba(0,0,0,.45);
    text-align:center;
}

h1{
    font-size:32px;
    margin-bottom:15px;
    color:#ffffff;
}

p{
    color:#a7b0c0;
    line-height:1.7;
    margin-bottom:35px;
}

.captcha{
    background:#12151d;
    border:1px solid #303846;
    border-radius:12px;
    padding:20px;
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap:15px;
}

input[type="checkbox"]{
    width:24px;
    height:24px;
    accent-color:#3b82f6;
    cursor:pointer;
}

label{
    font-size:17px;
    color:#f3f4f6;
    user-select:none;
}

button{
    margin-top:30px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    background:#1d4ed8;
}

button:disabled{
    opacity:.6;
    cursor:not-allowed;
}

#status{
    margin-top:20px;
    font-size:15px;
    color:#22c55e;
}
</style>

</head>
<body>
<div id="ads1">
    <script src="ads.js"></script>
    <script>
        Ads.banner300();
    </script>
</div>

<div id="ads2">
    <script>
        Ads.banner728();
    </script>
</div>
<div class="container">

<h1>Human Verification</h1>

<p>
Before continuing, please complete the verification below to confirm that you are a real visitor.
</p>

<div class="captcha">
<input type="checkbox" id="captcha">
<label for="captcha">I'm not a robot</label>
</div>

<button id="btn" onclick="verify()">
Continue
</button>

<div id="status"></div>

</div>

<script>
function verify(){

    const check=document.getElementById("captcha");

    if(!check.checked){
        alert("Please verify that you are not a robot.");
        return;
    }

    const btn=document.getElementById("btn");

    btn.disabled=true;
    btn.innerHTML="Verifying...";

    setTimeout(function(){

        document.getElementById("status").innerHTML=
        "✔ Verification successful. Redirecting...";

        setTimeout(function(){

            // Ganti URL tujuan di sini
            window.location.href="https://example.com";

        },1500);

    },1200);

}
</script>

</body>
</html>
